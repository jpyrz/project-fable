project_id = "project-fable"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[storage]
enabled = true

[storage.vector]
enabled = false

[auth]
enabled = true
site_url = "https://project-fable.netlify.app"
additional_redirect_urls = ["http://127.0.0.1:5173", "http://localhost:5173"]
enable_signup = true
minimum_password_length = 8

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.hook.before_user_created]
enabled = true
uri = "pg-functions://postgres/public/hook_require_invite"
